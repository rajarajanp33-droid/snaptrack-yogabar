<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SnapTrack">
<meta name="theme-color" content="#3FAEA1">
<title>SnapTrack — Yogabar Logistics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="./vendor/jsQR.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  /* Yogabar brand teal (sampled from the official symbol) as primary identity color */
  --teal:#3FAEA1; --teal-dark:#256F66; --teal-light:#DFF3F0;
  /* Coral = the "action" color — vivid, energetic, used for every tap-target / CTA */
  --orange:#F0603E; --orange-dark:#CC4A2C; --orange-light:#FDE3DA;
  /* Charcoal carries a whisper of teal so dark surfaces still read as "on brand" */
  --charcoal:#20302C;
  --paper:#FBF7EE; --card:#FFFFFF; --muted:#83786F; --line:#E7E1D3;
  --amber:#F0AA3D; --amber-light:#FCEDC9;
  --green:#3C9E74; --green-light:#DFF3E9;
  --red:#D6455B; --red-light:#FBE3E8;
  --blue:#3B6FA0; --blue-light:#E3ECF4;
  --radius:12px;
  --shadow:0 1px 2px rgba(32,48,44,0.05), 0 4px 16px rgba(32,48,44,0.07);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
html,body{margin:0;padding:0;overflow-x:hidden;width:100%;}
body{background:var(--paper);color:var(--charcoal);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;min-height:100dvh;}
h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
.mono{font-family:'IBM Plex Mono',monospace;}
button{font-family:inherit;cursor:pointer;touch-action:manipulation;}
button, .btn, .tab, .veh-pick, .move-pick, .queue-btn{min-height:38px;}
input, select, textarea{font-size:16px;}
.field input, .field select, .toolbar input, .toolbar select{font-size:14.5px;}
a{color:inherit;}
::selection{background:var(--orange-light);}
#app{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;width:100%;overflow-x:hidden;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;padding-top:calc(12px + env(safe-area-inset-top));background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:40;flex-wrap:wrap;gap:10px;box-shadow:0 1px 0 var(--teal-light);}
.brand{display:flex;align-items:center;gap:10px;}
.brand .mark{width:38px;height:38px;border-radius:50%;flex:none;box-shadow:0 0 0 3px var(--teal-light), var(--shadow);overflow:hidden;}
.brand .mark img{width:100%;height:100%;display:block;object-fit:cover;}
.brand .word{font-family:'Space Grotesk';font-weight:700;font-size:18px;letter-spacing:-0.01em;color:var(--teal-dark);}
.brand .sub{font-size:11px;color:var(--muted);margin-top:-2px;letter-spacing:.04em;text-transform:uppercase;}
.tabs{display:flex;gap:4px;flex-wrap:wrap;}
.tab{padding:8px 14px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--muted);background:transparent;border:none;transition:.15s;}
.tab:hover{background:var(--teal-light);color:var(--teal-dark);}
.tab.active{background:var(--teal-dark);color:white;}
.userchip{display:flex;align-items:center;gap:10px;font-size:13px;flex-wrap:wrap;justify-content:flex-end;}
.userchip .name{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
@media(max-width:480px){ .userchip .name{max-width:80px;} }
.userchip .name{font-weight:600;}
.userchip .role{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--teal-dark);background:var(--teal-light);padding:2px 8px;border-radius:20px;font-weight:700;}
.userchip .locpin{font-size:10.5px;color:var(--blue);background:var(--blue-light);padding:2px 8px;border-radius:20px;font-weight:700;}
.logout-btn{background:none;border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:600;color:var(--muted);}
.logout-btn:hover{border-color:var(--red);color:var(--red);}
.alert-badge{display:inline-block;background:var(--red);color:white;border-radius:20px;font-size:10px;font-weight:800;padding:1px 6px;margin-left:4px;vertical-align:middle;line-height:16px;min-width:16px;text-align:center;}

.main{flex:1;padding:24px;max-width:1240px;margin:0 auto;width:100%;}
@media(max-width:720px){.main{padding:14px;}.topbar{padding:12px 14px;}}

.grid{display:grid;gap:16px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:900px){.grid-4{grid-template-columns:repeat(2,1fr);}.grid-3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:560px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
.stat-card{position:relative;overflow:hidden;}
.stat-card .label{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.stat-card .value{font-family:'Space Grotesk';font-size:30px;font-weight:700;margin-top:6px;letter-spacing:-0.02em;}
.stat-card .unit{font-size:14px;color:var(--muted);font-weight:600;margin-left:3px;}
.stat-card .bar{position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--teal);}
.stat-card.alt .bar{background:var(--orange);}
.section-title{font-family:'Space Grotesk';font-size:18px;font-weight:700;margin:28px 0 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.section-title .tag{font-size:11px;background:var(--teal-light);color:var(--teal-dark);padding:2px 9px;border-radius:20px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.section-title .count{font-size:11px;background:var(--line);color:var(--muted);padding:2px 9px;border-radius:20px;font-weight:700;}

.btn{border-radius:10px;border:none;padding:11px 18px;font-weight:700;font-size:14px;display:inline-flex;align-items:center;gap:8px;transition:.15s;}
.btn-primary{background:var(--orange);color:white;}
.btn-primary:hover{background:var(--orange-dark);}
.btn-outline{background:transparent;border:1.5px solid var(--line);color:var(--charcoal);}
.btn-outline:hover{border-color:var(--orange);color:var(--orange-dark);}
.btn-dark{background:var(--charcoal);color:white;}
.btn-ghost{background:transparent;color:var(--muted);}
.btn-ghost:hover{color:var(--charcoal);}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:8px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-block{width:100%;justify-content:center;}
.btn-huge{width:100%;padding:22px 20px;font-size:19px;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:12px;box-shadow:0 6px 20px rgba(234,91,47,0.28);}
.btn-huge:active{transform:scale(.985);}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:linear-gradient(160deg, #2E9187 0%, #3FAEA1 38%, #E8825A 100%);}
.login-shell{width:100%;max-width:840px;background:var(--card);border-radius:22px;overflow:hidden;
  box-shadow:0 24px 60px rgba(20,40,36,0.35);display:grid;grid-template-columns:1fr 1fr;min-height:520px;}
@media(max-width:720px){.login-shell{grid-template-columns:1fr;min-height:0;}}
.login-hero{background:radial-gradient(circle at 30% 20%, rgba(255,255,255,0.16), transparent 55%), linear-gradient(200deg, #256F66 0%, #3FAEA1 55%, #F0603E 130%);
  color:white;padding:38px 32px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;}
.login-hero .hero-mark{width:76px;height:76px;border-radius:50%;box-shadow:0 0 0 4px rgba(255,255,255,0.35), 0 10px 26px rgba(0,0,0,0.25);overflow:hidden;}
.login-hero .hero-mark img{width:100%;height:100%;object-fit:cover;display:block;}
.login-hero h1{font-size:26px;margin:18px 0 6px;letter-spacing:-0.01em;line-height:1.15;}
.login-hero p{font-size:13.5px;color:rgba(255,255,255,0.88);margin:0;max-width:280px;line-height:1.5;}
.route-strip{display:flex;align-items:center;gap:6px;margin-top:26px;}
.route-strip .stop{width:9px;height:9px;border-radius:50%;background:#FFE1A8;box-shadow:0 0 0 3px rgba(255,255,255,0.25);flex:none;}
.route-strip .dash{flex:1;height:2px;background:repeating-linear-gradient(90deg, rgba(255,255,255,0.55) 0 6px, transparent 6px 12px);}
.route-labels{display:flex;justify-content:space-between;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:rgba(255,255,255,0.75);margin-top:6px;}
.login-side{padding:38px 34px;display:flex;flex-direction:column;justify-content:center;}
.login-side .kicker{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--teal-dark);margin-bottom:4px;}
.login-side h2{font-size:20px;margin:0 0 18px;letter-spacing:-0.01em;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--charcoal);margin-bottom:6px;text-transform:uppercase;letter-spacing:.03em;}
.field input,.field select{width:100%;padding:11px 13px;border-radius:9px;border:1.5px solid var(--line);font-size:14.5px;background:var(--paper);font-family:inherit;}
.field input:focus,.field select:focus{outline:none;border-color:var(--teal);background:white;}
.err-msg{background:var(--red-light);color:var(--red);border-radius:8px;padding:9px 12px;font-size:13px;font-weight:600;margin-bottom:14px;}

/* ---- bilingual display: bold/bigger selected language, small English underneath ---- */
.i18n{display:inline-flex;flex-direction:column;line-height:1.22;gap:1px;text-align:inherit;}
.i18n-main{font-weight:800;}
.i18n-en{font-size:0.64em;font-weight:600;opacity:.65;letter-spacing:0;text-transform:none;}
.lang-switch{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.lang-btn{padding:8px 14px;border-radius:9px;border:1.5px solid var(--line);background:var(--paper);font-size:13px;font-weight:700;color:var(--muted);}
.lang-btn.sel{border-color:var(--teal);background:var(--teal-light);color:var(--teal-dark);}
.lang-switch-top select{padding:6px 10px;border-radius:8px;border:1.5px solid var(--line);font-size:12.5px;font-weight:600;background:white;color:var(--charcoal);}

.veh-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.veh-pick{padding:16px 10px;border-radius:12px;border:2px solid var(--line);background:var(--card);text-align:center;font-family:'IBM Plex Mono';font-weight:600;font-size:14px;}
.veh-pick.sel{border-color:var(--orange);background:var(--orange-light);color:var(--orange-dark);}
.step-select{display:grid;grid-template-columns:1fr;gap:14px;max-width:520px;margin:0 auto;}

.ticket{max-width:560px;margin:0 auto;background:var(--card);border-radius:16px;border:1px solid var(--line);box-shadow:var(--shadow);overflow:hidden;}
.ticket-head{background:var(--charcoal);color:white;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;}
.ticket-head .veh{font-family:'IBM Plex Mono';font-weight:600;font-size:15px;}
.ticket-head .mv{font-size:12.5px;color:#D9D3CC;}
.ticket-body{padding:20px;}
.stepper{list-style:none;margin:0 0 20px;padding:0;}
.stepper li{display:flex;align-items:center;gap:12px;padding:8px 0;position:relative;}
.stepper li:not(:last-child)::after{content:'';position:absolute;left:11px;top:30px;bottom:-4px;width:2px;background:var(--line);}
.dot{width:24px;height:24px;border-radius:50%;background:var(--paper);border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);z-index:1;}
.dot.done{background:var(--green);border-color:var(--green);color:white;}
.dot.now{background:var(--orange);border-color:var(--orange);color:white;box-shadow:0 0 0 4px var(--orange-light);}
.step-label{font-size:13.5px;font-weight:600;flex:1;}
.step-time{font-family:'IBM Plex Mono';font-size:12px;color:var(--muted);}
.qr-alt{display:flex;justify-content:center;margin-top:12px;}
.qr-alt button{font-size:12.5px;color:var(--muted);background:none;border:none;text-decoration:underline;text-underline-offset:3px;}
.done-banner{text-align:center;padding:30px 20px;}
.done-banner .big{font-size:44px;}
.done-banner h3{margin:6px 0 4px;}
.done-banner p{color:var(--muted);font-size:13.5px;margin:0 0 18px;}
.perf{height:14px;background:radial-gradient(circle 7px at 0 7px, transparent 7px, var(--paper) 7.5px),radial-gradient(circle 7px at 100% 7px, transparent 7px, var(--paper) 7.5px);background-size:50% 100%;background-repeat:no-repeat;background-position:left,right;border-top:1.5px dashed var(--line);}

/* Trip Desk */
.desk-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:6px;}
.desk-loc{font-family:'Space Grotesk';font-size:22px;font-weight:700;display:flex;align-items:center;gap:10px;}
.desk-loc .pin{width:10px;height:10px;border-radius:50%;background:var(--orange);}
.loc-switch select{padding:8px 12px;border-radius:8px;border:1.5px solid var(--line);font-weight:600;font-size:13px;background:white;}
.queue-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);}
.queue-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px;}
.queue-veh{font-family:'IBM Plex Mono';font-weight:700;font-size:15px;}
.queue-meta{font-size:12px;color:var(--muted);}
.queue-btn{width:100%;padding:13px;border-radius:10px;background:var(--orange);color:white;font-weight:700;font-size:14.5px;border:none;}
.queue-btn:hover{background:var(--orange-dark);}
.new-arrival-card{border:1.5px dashed var(--amber);background:var(--amber-light);margin-top:20px;padding:18px;border-radius:var(--radius);box-shadow:0 -2px 8px rgba(32,48,44,0.08);}
.new-arrival-card .field label{color:#8A5C0B;}

.table-wrap{overflow-x:auto;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:640px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:12px 14px;border-bottom:1.5px solid var(--line);white-space:nowrap;background:var(--paper);}
td{padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap;}
tr:last-child td{border-bottom:none;}
td.mono,th.mono{font-family:'IBM Plex Mono';}
.badge{padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
.badge.red{background:var(--red-light);color:var(--red);}
.badge.green{background:var(--green-light);color:var(--green);}
.badge.amber{background:var(--amber-light);color:#8A5C0B;}
.badge.gray{background:var(--line);color:var(--muted);}
.badge.blue{background:var(--blue-light);color:var(--blue);}
.flag-row{background:var(--red-light);}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:14px;}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.pill-row input[type="date"]{min-width:0;flex:1 1 130px;max-width:170px;}
.empty{padding:50px 20px;text-align:center;color:var(--muted);}
.empty .big{font-size:34px;margin-bottom:8px;}
.pie-wrap{display:flex;gap:26px;align-items:center;flex-wrap:wrap;}
.pie{width:180px;height:180px;border-radius:50%;flex:none;}
.legend{display:flex;flex-direction:column;gap:9px;}
.legend .row{display:flex;align-items:center;gap:9px;font-size:13.5px;}
.legend .sw{width:12px;height:12px;border-radius:3px;}
.legend .row b{font-family:'IBM Plex Mono';margin-left:auto;padding-left:16px;}
.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;}
@media(max-width:900px){.two-col{grid-template-columns:1fr;}}
.form-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
@media(max-width:560px){.form-row{grid-template-columns:1fr;}}
.list-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);gap:10px;flex-wrap:wrap;}
.list-row:last-child{border-bottom:none;}
.modal-bg{position:fixed;inset:0;background:rgba(36,34,32,0.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;}
.modal{background:white;border-radius:16px;padding:22px;max-width:420px;width:100%;max-height:85vh;overflow:auto;}
.close-x{float:right;background:none;border:none;font-size:18px;color:var(--muted);}
.qr-box{display:flex;flex-direction:column;align-items:center;gap:10px;padding:10px 0;}
video#scanvid{width:100%;border-radius:12px;background:#000;}
.bottom-nav{display:none;}
@media(max-width:720px){
  .bottom-nav{display:flex;position:sticky;bottom:0;background:var(--card);border-top:1px solid var(--line);padding:6px 8px calc(6px + env(safe-area-inset-bottom));z-index:40;gap:4px;}
  .bottom-nav .tab{flex:1;text-align:center;font-size:11px;padding:8px 2px;min-height:34px;}
  .topbar .tabs{display:none;}
  .main{padding-bottom:20px;}
  th, td{padding:9px 10px;font-size:12.5px;}
  .login-hero{padding:28px 24px;}
  .login-side{padding:28px 24px;}
  .desk-loc{font-size:19px;}
  .stat-card .value{font-size:25px;}
  .btn-huge{padding:19px 16px;font-size:17px;}
}
@media(max-width:380px){
  .grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}
  .veh-grid{grid-template-columns:repeat(auto-fill,minmax(105px,1fr));}
}
.footnote{font-size:11.5px;color:var(--muted);margin-top:10px;line-height:1.5;}
.kpi-flag{color:var(--red);font-weight:700;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================================================
   YOGABAR LOGISTICS TRACKER — single-file app
   Data persistence: window.storage (shared = visible to all users)
   Auth: lightweight in-app username/password, admin-provisioned.
   NOT enterprise-grade security — good for keeping casual/accidental
   access out of a warehouse tablet, not for anything sensitive.
   ============================================================ */

const STEP_KEYS = ['reachedSource','loadingStart','loadingEnd','departed','reachedDestination','unloadingStart','unloadingEnd'];
const STEP_LABEL = {
  reachedSource:'Reached Source', loadingStart:'Begin Loading', loadingEnd:'Loading Completed',
  departed:'Departed', reachedDestination:'Reached Destination', unloadingStart:'Begin Unloading',
  unloadingEnd:'Unloading Completed'
};
const SOURCE_STEPS = ['reachedSource','loadingStart','loadingEnd','departed'];
const DEST_STEPS = ['reachedDestination','unloadingStart','unloadingEnd'];
const TRANSIT_STEPS = ['departed'];
const STEP_LABEL_KEY = {
  reachedSource:'stepReachedSource', loadingStart:'stepLoadingStart', loadingEnd:'stepLoadingEnd',
  departed:'stepDeparted', reachedDestination:'stepReachedDestination',
  unloadingStart:'stepUnloadingStart', unloadingEnd:'stepUnloadingEnd'

function i18nInterp(str, vars){ if(!vars) return str; return str.replace(/\{(\w+)\}/g, (m,k)=> (vars[k]!=null?vars[k]:'')); }
function t(key, vars){
  const enStr = (I18N.en[key]!=null) ? I18N.en[key] : key;
  const enOut = i18nInterp(enStr, vars);
  if(S.lang==='en' || !S.lang) return escapeHtml(enOut);
  const trStr = (I18N[S.lang] && I18N[S.lang][key]!=null) ? I18N[S.lang][key] : enStr;
  const trOut = i18nInterp(trStr, vars);
  return '<span class="i18n"><span class="i18n-main">'+escapeHtml(trOut)+'</span><span class="i18n-en">'+escapeHtml(enOut)+'</span></span>';
}
function tLine(key, vars){
  const enStr = (I18N.en[key]!=null) ? I18N.en[key] : key;
  const enOut = i18nInterp(enStr, vars);
  if(S.lang==='en' || !S.lang) return enOut;
  const trStr = (I18N[S.lang] && I18N[S.lang][key]!=null) ? I18N[S.lang][key] : enStr;
  const trOut = i18nInterp(trStr, vars);
  return trOut + ' (' + enOut + ')';
}

}

/* ---------------- storage helpers ---------------- */
const API_BASE = '/api';
let AUTH_TOKEN = sessionStorage.getItem('snaptrack_token') || null;

function getStoredToken(){
  return sessionStorage.getItem('snaptrack_token') || localStorage.getItem('snaptrack_token') || null;
}
function persistToken(token){
  if(token){ sessionStorage.setItem('snaptrack_token', token); }
  else{ sessionStorage.removeItem('snaptrack_token'); localStorage.removeItem('snaptrack_token'); }
}
async function apiRequest(path, { method='GET', body, auth=true } = {}){
  const headers = {};
  if(body != null) headers['Content-Type'] = 'application/json';
  if(auth && AUTH_TOKEN) headers['Authorization'] = `Bearer ${AUTH_TOKEN}`;
  const res = await fetch(`${API_BASE}/${String(path).replace(/^\/+/, '')}`, {
    method,
    headers,
    body: body == null ? undefined : JSON.stringify(body)
  });
  const text = await res.text();
  let data = null;
  if(text){ try{ data = JSON.parse(text); } catch(e){ data = null; } }
  if(!res.ok){ throw new Error((data && data.error) || `Request failed (${res.status})`); }
  return data;
}
async function sGet(key, shared){
  if(key==='last_username') return localStorage.getItem('snaptrack_last_username');
  if(key==='lang_pref') return localStorage.getItem('snaptrack_lang_pref');
  if(key==='vehicles' && S) return S.vehicles;
  if(key==='locations' && S) return S.locations;
  if(key==='settings' && S) return S.settings;
  if(key==='users' && S) return S.users;
  if(key==='delay_reasons' && S) return S.delayReasons;
  if(key==='trips' && S) return S.trips;
  return null;
}
async function sSet(key, value, shared){
  if(key==='last_username'){ if(value==null) localStorage.removeItem('snaptrack_last_username'); else localStorage.setItem('snaptrack_last_username', value); return; }
  if(key==='lang_pref'){ if(value==null) localStorage.removeItem('snaptrack_lang_pref'); else localStorage.setItem('snaptrack_lang_pref', value); return; }
}
function simpleHash(str){
  let h=5381;
  for(let i=0;i<str.length;i++){ h=((h<<5)+h)+str.charCodeAt(i); h=h|0; }
  return (h>>>0).toString(16) + str.length.toString(16);
}

async function boot(){
  AUTH_TOKEN = getStoredToken();
  const [bootData, lastUsername, langPref] = await Promise.all([
    AUTH_TOKEN ? apiRequest('bootstrap', { auth:true }).catch(()=>null) : Promise.resolve(null),
    sGet('last_username', false),
    sGet('lang_pref', false)
  ]);

  if(bootData){
    S.vehicles = (bootData.vehicles||[]).map(v=>({ ...v, active: v.active !== 0 && v.active !== false }));
    S.locations = (bootData.locations||[]).map(l=>({ ...l, active: l.active !== 0 && l.active !== false }));
    S.settings = Object.assign({}, DEFAULT_SETTINGS, bootData.settings || {});
    S.users = (bootData.users||[]).map(u=>({ ...u, active: u.active !== 0 && u.active !== false }));
    S.delayReasons = (bootData.delayReasons||[]).map(r=>({ ...r, active: r.active !== 0 && r.active !== false }));
    S.user = bootData.me ? { ...bootData.me, active: bootData.me.active !== 0 && bootData.me.active !== false } : null;
    S.needsSetup = false;
    S.view = S.user ? defaultTabFor(S.user.role) : 'login';
  } else {
    let needsSetup = false;
    try{ const state = await apiRequest('setup-status', { auth:false }); needsSetup = !!state?.needsSetup; }
    catch(e){ needsSetup = false; }
    S.vehicles = DEFAULT_VEHICLES.slice();
    S.locations = DEFAULT_LOCATIONS.slice();
    S.settings = Object.assign({}, DEFAULT_SETTINGS);
    S.users = [];
    S.delayReasons = DEFAULT_DELAY_REASONS.slice();
    S.user = null;
    S.needsSetup = needsSetup;
    S.view = needsSetup ? 'setup' : 'login';
  }

  S.trips = await loadAllTrips();
  S.prefillUsername = lastUsername || '';
  S.lang = langPref || 'en';
  S.deskLocationId = (S.locations[0] && S.locations[0].id) || null;
  S.loaded = true;
  render();
}

function monthKeyOf(ts){ return new Date(ts).getFullYear()+'-'+String(new Date(ts).getMonth()+1).padStart(2,'0'); }
async function loadAllTrips(){
  if(!AUTH_TOKEN) return [];
  try{ const rows = await apiRequest('trips', { auth:true }); return Array.isArray(rows) ? rows.map(tr=>({...tr, ts: tr.ts || {}, delays: tr.delays || {}})) : []; }
  catch(e){ return []; }
}
async function createTripPersisted(trip){
  const payload = {
    vehicleId: trip.vehicleId,
    sourceId: trip.sourceId,
    destId: trip.destId,
    driverName: trip.driverName
  };
  try{
    const created = await apiRequest('trips', { method:'POST', body: payload, auth:true });
    const merged = { ...trip, ...created, ts: created.ts || trip.ts, delays: created.delays || {} };
    S.trips.push(merged);
    return merged;
  }catch(e){
    if(String(e.message).includes('already has an active trip')){ const err = new Error('VEHICLE_BUSY'); throw err; }
    throw e;
  }
}
async function mutateTrip(tripId, mutatorFn){
  const inMemory = S.trips.find(t=>t.id===tripId);
  if(!inMemory) return null;
  const copy = JSON.parse(JSON.stringify(inMemory));
  mutatorFn(copy);
  const idx = S.trips.findIndex(t=>t.id===tripId);
  if(idx >= 0) S.trips[idx] = copy;
  return copy;
}

async function saveVehicles(){
  const serverItems = await apiRequest('vehicles', { auth:true }).catch(()=>[]);
  const currentIds = new Set(S.vehicles.map(v=>v.id));

  for(const item of S.vehicles){
    const existing = serverItems.find(v=>v.id===item.id);
    if(!existing){
      const created = await apiRequest('vehicles', { method:'POST', body:{ number:item.number }, auth:true });
      item.id = created.id;
      item.number = created.number;
      item.active = created.active !== 0 && created.active !== false;

      await apiRequest(`vehicles/${item.id}`, { method:'PATCH', body:{ number:item.number, active:item.active }, auth:true });

/* ---------------- utils ---------------- */
function uid(p){ return p+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function fmtTime(ts){ if(!ts) return '—'; const d=new Date(ts); return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(ts){ if(!ts) return '—'; const d=new Date(ts); return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'}); }
function fmtDur(ms){
  if(ms==null || isNaN(ms) || ms<0) return '—';
  const m = Math.round(ms/60000);
  if(m<60) return m+'m';
  return Math.floor(m/60)+'h '+(m%60)+'m';
}
function isToday(ts){ const d=new Date(ts), n=new Date(); return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth() && d.getDate()===n.getDate(); }
function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function nextStepKey(trip){ const filled = STEP_KEYS.filter(k=>trip.ts[k]); return STEP_KEYS[filled.length] || null; }
function vehicleNumber(id){ const v=S.vehicles.find(v=>v.id===id); return v?v.number:'—'; }
function locationName(id){ const l=S.locations.find(l=>l.id===id); return l?l.name:'—'; }
function activeTripForVehicle(vid){ return S.trips.find(t=>t.vehicleId===vid && t.status==='in_progress'); }

function tripMetrics(t){
  const ts=t.ts;
  const loadingTime = (ts.loadingEnd && ts.loadingStart) ? ts.loadingEnd-ts.loadingStart : null;
  const travelTime = (ts.reachedDestination && ts.departed) ? ts.reachedDestination-ts.departed : null;
  const unloadingTime = (ts.unloadingEnd && ts.unloadingStart) ? ts.unloadingEnd-ts.unloadingStart : null;
  const waitAtSource = (ts.loadingStart && ts.reachedSource) ? ts.loadingStart-ts.reachedSource : null;
  const waitAtDest = (ts.unloadingStart && ts.reachedDestination) ? ts.unloadingStart-ts.reachedDestination : null;
  const totalWait = (waitAtSource||0)+(waitAtDest||0);
  const turnaround = (ts.unloadingEnd && ts.reachedSource) ? ts.unloadingEnd-ts.reachedSource : null;
  const running = (loadingTime||0)+(travelTime||0)+(unloadingTime||0);
  return {loadingTime,travelTime,unloadingTime,waitAtSource,waitAtDest,totalWait,turnaround,running};
}
function tripFlags(t){
  const m = tripMetrics(t); const st = S.settings; const flags=[];
  if(m.loadingTime!=null && m.loadingTime > st.expectedLoading*60000) flags.push('Loading > '+st.expectedLoading+'m');
  if(m.travelTime!=null && m.travelTime > st.expectedTravel*60000) flags.push('Travel > '+st.expectedTravel+'m');
  if(m.unloadingTime!=null && m.unloadingTime > st.expectedUnloading*60000) flags.push('Unloading > '+st.expectedUnloading+'m');
  return flags;
}
function vehicleIdleMs(vid){
  const vt = S.trips.filter(t=>t.vehicleId===vid).sort((a,b)=>b.createdAt-a.createdAt);
  if(activeTripForVehicle(vid)) return 0;
  if(!vt.length) return null;
  const last = vt[0];
  const lastTs = Math.max(...Object.values(last.ts).filter(Boolean), last.createdAt);
  return Date.now()-lastTs;
}
function roleLabel(r){ return {admin:'Admin', manager:'Manager', operator:'Operator', driver:'Driver'}[r]||r; }

/* ---------------- date range filtering (shared by Vehicles / Analytics / Reports) ---------------- */
function startOfDay(d){ const x=new Date(d); x.setHours(0,0,0,0); return x.getTime(); }
function endOfDay(d){ const x=new Date(d); x.setHours(23,59,59,999); return x.getTime(); }
function dateInputVal(ms){ const d=new Date(ms); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function presetRangeMs(fs){
  const now = new Date();
  if(fs.preset==='today') return {start:startOfDay(now), end:endOfDay(now)};
  if(fs.preset==='yesterday'){ const y=new Date(now); y.setDate(y.getDate()-1); return {start:startOfDay(y), end:endOfDay(y)}; }
  if(fs.preset==='7d'){ const s=new Date(now); s.setDate(s.getDate()-6); return {start:startOfDay(s), end:endOfDay(now)}; }
  if(fs.preset==='30d'){ const s=new Date(now); s.setDate(s.getDate()-29); return {start:startOfDay(s), end:endOfDay(now)}; }
  if(fs.preset==='month'){ const s=new Date(now.getFullYear(), now.getMonth(), 1); return {start:startOfDay(s), end:endOfDay(now)}; }
  if(fs.preset==='custom'){
    const s = fs.from ? startOfDay(new Date(fs.from)) : startOfDay(now);
    const e = fs.to ? endOfDay(new Date(fs.to)) : endOfDay(now);
    return {start:Math.min(s,e), end:Math.max(s,e)};
  }
  return {start:startOfDay(now), end:endOfDay(now)};
}
function daysInRange(fs){
  const {start,end} = presetRangeMs(fs);
  return Math.max(1, Math.round((end-start)/86400000));
}
function tripsInRange(fs){
  const {start,end} = presetRangeMs(fs);
  return S.trips.filter(tr=> tr.createdAt>=start && tr.createdAt<=end && (fs.vehicleId==='all' || tr.vehicleId===fs.vehicleId));
}
const RANGE_PRESETS = [['today','dashToday'],['yesterday','rangeYesterday'],['7d','range7d'],['30d','range30d'],['month','rangeMonth'],['custom','rangeCustom']];
function rangeBarHtml(stateKey, showVehiclePicker){

      ${fs.preset==='custom' ? `<input type="date" value="${fs.from||dateInputVal(Date.now())}" onchange="setRangeCustom('${stateKey}','from',this.value)" style="padding:7px 10px;border-radius:8px;border:1.5px solid var(--line);font-size:12.5px;">
      <input type="date" value="${fs.to||dateInputVal(Date.now())}" onchange="setRangeCustom('${stateKey}','to',this.value)" style="padding:7px 10px;border-radius:8px;border:1.5px solid var(--line);font-size:12.5px;">` : ''}
    </div>
    ${showVehiclePicker ? `<select onchange="setRangeVehicle('${stateKey}',this.value)" style="padding:7px 10px;border-radius:8px;border:1.5px solid var(--line);font-size:12.5px;font-weight:600;">

function dayBucketsFor(rangeAll, start, end){
  const buckets = [];
  for(let d=start; d<=end; d+=86400000){
    const dayStart=startOfDay(d), dayEnd=endOfDay(d);
    const count = rangeAll.filter(t=>t.createdAt>=dayStart && t.createdAt<=dayEnd).length;
    buckets.push({label: new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short'}), count});
  }
  return buckets;
}
function trendChartHtml(dayBuckets){

}

function render(){
  const app = document.getElementById('app');
  if(!S.loaded){ app.innerHTML = '<div class="login-wrap"><div class="mono" style="color:var(--muted)">Loading SnapTrack…</div></div>'; return; }
  if(S.needsSetup){ app.innerHTML = renderSetup(); attachEnterKey('setupUsername','doSetup'); attachEnterKey('setupPassword','doSetup'); return; }
  if(!S.user){ app.innerHTML = renderLogin(); attachEnterKey('loginUsername','doLogin'); attachEnterKey('loginPassword','doLogin'); return; }

  let body = '';
  if(S.view==='trip') body = renderTrip();
  else if(S.view==='deck') body = renderDesk();
  else if(S.view==='dashboard') body = renderDashboard();
  else if(S.view==='fleetboard') body = renderFleetBoard();
  else if(S.view==='vehicles') body = renderVehicleReport();
  else if(S.view==='analytics') body = renderAnalytics();
  else if(S.view==='alerts') body = renderAlerts();
  else if(S.view==='reports') body = renderReports();
  else if(S.view==='admin') body = renderAdmin();
  else body = defaultViewFor(S.user.role);

  const navTabs = [];
  if(S.user.role==='operator'){ navTabs.push({k:'deck', lk:'navDeck'}, {k:'fleetboard', lk:'navFleet'}); }
  if(S.user.role==='driver'){ navTabs.push({k:'trip', lk:'navTrip'}, {k:'dashboard', lk:'navDashboard'}); }
  if(S.user.role==='admin' || S.user.role==='manager'){
    navTabs.push({k:'fleetboard', lk:'navFleet'}, {k:'deck', lk:'navDeck'}, {k:'dashboard', lk:'navDashboard'}, {k:'vehicles', lk:'navVehicles'}, {k:'analytics', lk:'navAnalytics'}, {k:'alerts', lk:'navAlerts'}, {k:'reports', lk:'navReports'});
  }
  if(S.user.role==='admin') navTabs.push({k:'admin', lk:'navAdmin'});
  // Compute alert badge count for relevant roles
  const alertBadge = (()=>{
    if(!S.user || S.user.role==='driver') return 0;
    const today = S.trips.filter(t=>isToday(t.createdAt));
    let count = 0;
    today.forEach(trip=>{
      const flags = tripFlags(trip);
      // Operator: only count their location's trips
      if(S.user.role==='operator'){
        if(trip.sourceId !== S.user.locationId && trip.destId !== S.user.locationId) return;
      }
      count += flags.length;
    });
    // Also count vehicles idle > 2h
    if(S.user.role==='admin' || S.user.role==='manager'){
      count += S.vehicles.filter(v=>v.active!==false).filter(v=>{ const idle=vehicleIdleMs(v.id); return idle!=null && idle>7200000; }).length;
    }
    return count;
  })();
  const tabsHtml = navTabs.map(tb=>{
    const isAlert = tb.k==='alerts' && alertBadge > 0;
    return `<button class="tab ${S.view===tb.k?'active':''}" onclick="goView('${tb.k}')">${t(tb.lk)}${isAlert?` <span class="alert-badge">${alertBadge}</span>`:''}</button>`;
  }).join('');

  app.innerHTML = `
    <div class="topbar">
      <div class="brand">
        <div class="mark"><img src="${YB_LOGO}" alt="Yogabar"></div>
        <div><div class="word">SnapTrack</div><div class="sub">by Yogabar</div></div>
      </div>
      <div class="tabs">
        ${tabsHtml}
      </div>
      <div class="userchip">
        ${langSwitchHtml(true)}
        <div style="text-align:right;"><div class="name">${escapeHtml(S.user.name)}</div></div>
        <span class="role">${tLine('role'+S.user.role.charAt(0).toUpperCase()+S.user.role.slice(1))}</span>
        ${S.user.role==='operator' ? `<span class="locpin">📍 ${escapeHtml(locationName(S.user.locationId))}</span>` : ''}
        <button class="logout-btn" onclick="logout()">${tLine('logout')}</button>
      </div>
    </div>
    <div class="main">${body}</div>
    <div class="bottom-nav">
      ${tabsHtml}
    </div>
  `;
  afterRenderHooks();
}

  if(role==='operator') return renderDesk();
  if(role==='driver') return renderTrip();
  return renderDashboard();

async function startTrip(){
  const {vehicleId, sourceId, destId} = S.tripDraft;
  if(!vehicleId || !sourceId || !destId) return;
  if(activeTripForVehicle(vehicleId)){ alert('This vehicle already has an active trip.'); return; }
  const trip = {
    id: uid('trip'), vehicleId, vehicleNumber: vehicleNumber(vehicleId), driverName: S.user.name, createdBy:S.user.username,
    sourceId, destId, sourceName: locationName(sourceId), destName: locationName(destId),
    status:'in_progress', createdAt: Date.now(),
    ts: {reachedSource:null,loadingStart:null,loadingEnd:null,departed:null,reachedDestination:null,unloadingStart:null,unloadingEnd:null}
  };
  try{
    await createTripPersisted(trip);
  }catch(e){
    if(e.message==='VEHICLE_BUSY'){ alert('This vehicle was just started on another trip by someone else — pick a different vehicle.'); render(); return; }
    throw e;
  }
  S.tripDraft = {vehicleId:null, sourceId:null, destId:null};
  render();
}

function renderTicket(trip){
  const key = nextStepKey(trip);

        </div>
      </div>

  }

    const done = !!trip.ts[k]; const isNow = k===key;

      <div class="step-label">${t(STEP_LABEL_KEY[k])}</div><div class="step-time mono">${done?fmtTime(trip.ts[k]):(isNow?tLine('inProgress'):'')}</div></li>`;
  }).join('');
  return `
  <div class="ticket">
    <div class="ticket-head"><div><div class="veh">${trip.vehicleNumber}</div><div class="mv">${movLabel} · ${escapeHtml(trip.driverName)}</div></div><span class="badge amber">${tLine('inProgress')}</span></div>
    <div class="perf"></div>
    <div class="ticket-body">
      <ul class="stepper">${stepsHtml}</ul>
      <button class="btn btn-huge btn-primary" onclick="advanceTrip('${trip.id}')">${t(STEP_LABEL_KEY[key])}</button>
      ${gateLocId ? `<div class="qr-alt"><button onclick="openScan('${trip.id}','${gateLocId}')">${tLine('scanInstead',{loc:gateLocName})}</button></div>` : ''}
      <div class="footnote" style="text-align:center;margin-top:14px;">${tLine('tapInstruction')}</div>
    </div>
  </div>`;
}
async function advanceTrip(id){
  const trip = S.trips.find(t=>t.id===id); if(!trip) return;
  const key = nextStepKey(trip); if(!key) return;
  const reqLoc = stepLocationFor(trip, key);
  if(S.user.role==='operator' && reqLoc !== S.user.locationId){
    alert('This step happens at '+locationName(reqLoc)+' — it can only be logged from that location\'s Trip Desk.');
    return;
  }
  if(S.user.role==='driver' && trip.driverName !== S.user.name){
    alert('This is not your trip.'); return;
  }
  try{
    const updated = await apiRequest(`trips/${id}/advance`, { method:'POST', auth:true });
    const tripIndex = S.trips.findIndex(t=>t.id===id);
    if(tripIndex >= 0) S.trips[tripIndex] = { ...S.trips[tripIndex], ...updated.trip, ts: updated.trip.ts || S.trips[tripIndex].ts, delays: updated.trip.delays || S.trips[tripIndex].delays || {} };
    const segment = DELAY_CHECK_STEP[key];
    if(segment && updated.delayNeeded){
      render();
      openDelayModal(id, segment);
      return;
    }
    render();
  }catch(e){
    alert(e.message || 'Could not advance the trip.');
  }
}
function isSegmentDelayed(trip, segment){
  const m = tripMetrics(trip); const st = S.settings;
  if(segment==='loading') return m.loadingTime!=null && m.loadingTime > st.expectedLoading*60000;
  if(segment==='travel') return m.travelTime!=null && m.travelTime > st.expectedTravel*60000;
  if(segment==='unloading') return m.unloadingTime!=null && m.unloadingTime > st.expectedUnloading*60000;
  return false;
}
function segmentLabelKey(segment){ return {loading:'loadingWord', travel:'travelWord', unloading:'unloadingWord'}[segment]; }
function openDelayModal(tripId, segment){
  S.delayModal = {tripId, segment, reasonId:'', remarks:''};
  const modal = document.createElement('div');
  modal.className='modal-bg'; modal.id='delayModal';
  document.body.appendChild(modal);
  renderDelayModal();
}
function renderDelayModal(){
  const el = document.getElementById('delayModal'); if(!el || !S.delayModal) return;
  const dm = S.delayModal;
  const activeReasons = S.delayReasons.filter(r=>r.active!==false);
  el.innerHTML = `<div class="modal">
    <h3 style="margin-top:0;">${t('delayModalTitle')}</h3>
    <p class="footnote" style="margin-top:-6px;">${tLine('delayRequiredNote')} <b>(${tLine(segmentLabelKey(dm.segment))})</b></p>
    <div class="field"><label>${tLine('delayReasonLabel')}</label>
      <select id="dm_reason" onchange="S.delayModal.reasonId=this.value">
        <option value="">${tLine('delayReasonPlaceholder')}</option>
        ${activeReasons.map(r=>`<option value="${r.id}" ${dm.reasonId===r.id?'selected':''}>${escapeHtml(r.label)}</option>`).join('')}
      </select>
    </div>
    <div class="field"><label>${tLine('delayRemarksLabel')}</label>
      <textarea id="dm_remarks" rows="3" placeholder="${tLine('delayRemarksPlaceholder')}" style="width:100%;padding:11px 13px;border-radius:9px;border:1.5px solid var(--line);font-size:14px;font-family:inherit;resize:vertical;" oninput="S.delayModal.remarks=this.value">${escapeHtml(dm.remarks)}</textarea>
    </div>
    <button class="btn btn-primary btn-block" id="dm_save" onclick="saveDelayReason()" ${dm.reasonId?'':'disabled'}>${t('delaySaveButton')}</button>
  </div>`;

async function saveDelayReason(){
  const dm = S.delayModal; if(!dm || !dm.reasonId) return;
  const local = S.trips.find(t=>t.id===dm.tripId); if(!local){ closeDelayModal(); return; }
  const reason = S.delayReasons.find(r=>r.id===dm.reasonId);
  try{
    await apiRequest(`trips/${dm.tripId}/delay`, { method:'POST', auth:true, body:{ segment: dm.segment, reasonId: dm.reasonId, remarks: dm.remarks || '' } });
    const tripIndex = S.trips.findIndex(t=>t.id===dm.tripId);
    if(tripIndex >= 0){
      const freshDelays = { ...(S.trips[tripIndex].delays || {}) };
      freshDelays[dm.segment] = { reasonId:dm.reasonId, reasonLabel: reason?reason.label:'', remarks:(dm.remarks||'').trim(), capturedAt: Date.now() };
      S.trips[tripIndex] = { ...S.trips[tripIndex], delays: freshDelays };
    }
  }catch(e){
    alert(e.message || 'Could not save the delay reason.');
  }
  closeDelayModal();
  render();
}
function closeDelayModal(){
  S.delayModal = null;
  const m = document.getElementById('delayModal'); if(m) m.remove();
}

/* ---- QR gate scan ----
   The QR only identifies the LOCATION, never the vehicle — the vehicle/trip is already
   known from who's logged in (a driver's own open trip, or the Trip Desk queue at that
   location), so scanning just confirms "this trip has reached this place" and stamps
   the next timestamp. One static poster per location works for every vehicle. */
async function openScan(tripId, locId){
  const locName = locationName(locId);
  const modal = document.createElement('div');
  modal.className='modal-bg'; modal.id='scanModal';
  modal.innerHTML = `<div class="modal">
    <button class="close-x" onclick="closeScan()">✕</button>
    <h3 style="margin-top:0;">📷 Scan ${escapeHtml(locName)} Gate QR</h3>
    <div class="qr-box">
      <video id="scanvid" autoplay playsinline muted style="width:100%;border-radius:8px;background:#000;"></video>
      <canvas id="scancanvas" style="display:none;"></canvas>
      <div id="scanStatus" class="footnote" style="text-align:center;margin-top:10px;font-size:14px;">Starting camera…</div>
    </div>
    <p class="footnote" style="text-align:center;">Hold the phone steady — point at the QR code on the gate</p>
    <input id="scanImageInput" type="file" accept="image/*" style="display:none;" onchange="handleScanImageUpload(event,'${tripId}','${locId}')">
    <button class="btn btn-outline btn-block" type="button" onclick="document.getElementById('scanImageInput').click()">Upload QR photo</button>
    <button class="btn btn-outline btn-block" type="button" onclick="confirmScannedGate('${tripId}')">Continue without camera</button>
  </div>`;
  document.body.appendChild(modal);
  const setStatus = (msg) => { const el = document.getElementById('scanStatus'); if(el) el.textContent = msg; };
  if(!window.isSecureContext || !navigator.mediaDevices || typeof navigator.mediaDevices.getUserMedia !== 'function'){
    setStatus('Camera scanning needs HTTPS or localhost plus camera support in this browser. Use the button below.');
    return;
  }
  if(typeof window.jsQR !== 'function'){
    setStatus('QR scanner library did not load. Use the button below.');
    return;
  }
  try{
    const stream = await getScanStream();
    const video = document.getElementById('scanvid');
    if(!video){ stream.getTracks().forEach(t=>t.stop()); return; }
    video.setAttribute('playsinline', 'true');
    video.srcObject = stream;
    S.scanCtx = {stream};
    const canvas = document.getElementById('scancanvas');
    const ctx = canvas.getContext('2d');
    const expected = gateToken(locId);
    let scanActive = true;
    let lastMismatch = 0;
    let started = false;
    const startScanLoop = ()=>{
      if(started || !scanActive) return;
      started = true;
      setStatus('Scanning... point at the gate QR code');
      S.scanCtx.timer = requestAnimationFrame(tick);
    };
    const tick = ()=>{
      if(!scanActive || !document.getElementById('scanModal')){
        scanActive = false;
        return;
      }
      // Accept readyState >= 2 (HAVE_CURRENT_DATA) — works on more mobile browsers
      if(video && video.readyState >= 2 && video.videoWidth > 0){
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        try{
          const code = jsQR(img.data, img.width, img.height);
          if(code && code.data){
            if(code.data.trim() === expected){
              setStatus('Gate verified - saving...');
              scanActive = false;
              closeScan();
              advanceTrip(tripId);
              return;
            } else {
              lastMismatch = Date.now();
              setStatus('Wrong QR - this is not the ' + locName + ' gate code');
            }
          } else {
            if(Date.now() - lastMismatch > 2000) setStatus('Scanning... point at the gate QR code');
          }
        }catch(e){ console.error('jsQR error:', e); }
      } else {
        setStatus('Camera starting...');
      }
      S.scanCtx.timer = requestAnimationFrame(tick);
    };
    const handleVideoReady = ()=>{
      video.play().then(()=>{
        startScanLoop();
      }).catch(e=>{
        setStatus('Camera error: ' + e.message + '. Use the button instead.');
      });
    };
    video.addEventListener('loadedmetadata', handleVideoReady, { once:true });
    video.addEventListener('loadeddata', startScanLoop, { once:true });
    video.addEventListener('canplay', startScanLoop, { once:true });
    if(video.readyState >= 2) handleVideoReady();
    setTimeout(()=>{
      if(scanActive && !started) startScanLoop();
    }, 1000);
  }catch(e){
    const statusEl = document.getElementById('scanStatus');
    if(statusEl){
      if(e.name === 'NotAllowedError') statusEl.textContent = 'Camera permission denied. Allow camera access in browser settings, then try again.';
      else if(e.name === 'NotFoundError') statusEl.textContent = 'No camera found on this device. Use the button below.';
      else statusEl.textContent = 'Camera unavailable (' + e.name + '). Use the button below.';
    }
    console.error('Camera access error:', e);
  }
}
async function getScanStream(){
  const attempts = [
    { video:{ facingMode:{ ideal:'environment' }, width:{ ideal:1280 }, height:{ ideal:720 } } },
    { video:{ facingMode:'environment' } },
    { video:true }
  ];
  let lastError = null;
  for(const constraints of attempts){
    try{
      return await navigator.mediaDevices.getUserMedia(constraints);
    }catch(e){
      lastError = e;
    }
  }
  throw lastError || new Error('Camera unavailable');
}
async function handleScanImageUpload(event, tripId, locId){
  const input = event.target;
  const file = input && input.files && input.files[0];
  if(!file) return;
  const statusEl = document.getElementById('scanStatus');
  const setStatus = (msg) => { if(statusEl) statusEl.textContent = msg; };
  try{
    setStatus('Reading QR photo...');
    const image = await loadImageFromFile(file);
    const canvas = document.getElementById('scancanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = image.naturalWidth || image.width;
    canvas.height = image.naturalHeight || image.height;
    ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(img.data, img.width, img.height);
    if(!code || !code.data){
      setStatus('Could not read a QR code from that image. Try a clearer photo or use the button below.');
      return;
    }
    const expected = gateToken(locId);
    if(code.data.trim() !== expected){
      setStatus('Wrong QR - this is not the ' + locationName(locId) + ' gate code');
      return;
    }
    setStatus('Gate verified from photo - saving...');
    closeScan();
    await advanceTrip(tripId);
  }catch(e){
    setStatus('Could not process that image. Try another photo or use the button below.');
    console.error('QR image scan error:', e);
  }finally{
    if(input) input.value = '';
  }
}
function loadImageFromFile(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = ()=> reject(new Error('Failed to read image file'));
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=> resolve(img);
      img.onerror = ()=> reject(new Error('Failed to decode image file'));
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}
async function confirmScannedGate(tripId){
  closeScan();
  await advanceTrip(tripId);
}
function closeScan(){
  if(S.scanCtx){ if(S.scanCtx.timer) cancelAnimationFrame(S.scanCtx.timer); if(S.scanCtx.stream) S.scanCtx.stream.getTracks().forEach(t=>t.stop()); S.scanCtx=null; }
  const m = document.getElementById('scanModal'); if(m) m.remove();
}

function deskSetVehicle(id){ S.deskDraft.vehicleId=id||null; render(); }
function deskSetDest(id){ S.deskDraft.destId=id||null; render(); }
async function logArrival(sourceId){
  const {vehicleId, destId, driverName} = S.deskDraft;
  if(!vehicleId || !destId) return;
  if(activeTripForVehicle(vehicleId)){ alert('This vehicle already has an active trip.'); S.deskDraft={vehicleId:null,destId:null,driverName:''}; render(); return; }
  const trip = {
    id: uid('trip'), vehicleId, vehicleNumber: vehicleNumber(vehicleId),

    status:'in_progress', createdAt: Date.now(),
    ts: {reachedSource:Date.now(),loadingStart:null,loadingEnd:null,departed:null,reachedDestination:null,unloadingStart:null,unloadingEnd:null}

    await createTripPersisted(trip);

    throw e;

/* ================= FLEET BOARD ================= */
function renderFleetBoard(){
  const allTrips = S.trips.filter(t => t.status === 'in_progress');
  
  // Build current state for each vehicle
  const vehicleStates = {};
  S.vehicles.filter(v=>v.active!==false).forEach(v => {
    vehicleStates[v.id] = { 
      id: v.id, 
      number: v.number, 
      status: 'available', 
      location: null, 
      step: null, 
      trip: null,
      durationMins: 0,
      sourceLocation: null,
      destLocation: null
    };
  });

  allTrips.forEach(trip => {
    if(vehicleStates[trip.vehicleId]){
      vehicleStates[trip.vehicleId].status = 'in_transit';
      vehicleStates[trip.vehicleId].trip = trip;
      vehicleStates[trip.vehicleId].step = trip.step;
      vehicleStates[trip.vehicleId].sourceLocation = locationName(trip.sourceId);
      vehicleStates[trip.vehicleId].destLocation = locationName(trip.destId);
      
      // Calculate current location and duration based on step
      const ts = trip.ts || {};
      if(SOURCE_STEPS.includes(trip.step)){ 
        vehicleStates[trip.vehicleId].location = vehicleStates[trip.vehicleId].sourceLocation; 
        if(ts.reachedSource) vehicleStates[trip.vehicleId].durationMins = Math.round((Date.now() - ts.reachedSource) / 60000);
      } 
      else if(trip.step === 'departed'){ 
        vehicleStates[trip.vehicleId].location = 'Transit'; 
        if(ts.departed) vehicleStates[trip.vehicleId].durationMins = Math.round((Date.now() - ts.departed) / 60000);
      }
      else if(DEST_STEPS.includes(trip.step)){ 
        vehicleStates[trip.vehicleId].location = vehicleStates[trip.vehicleId].destLocation; 
        if(ts.reachedDestination) vehicleStates[trip.vehicleId].durationMins = Math.round((Date.now() - ts.reachedDestination) / 60000);
      }
    }
  });

  const vehicles = Object.values(vehicleStates);
  const filter = S.fleetFilter.type;
  let filtered = vehicles;
  if(filter === 'busy') filtered = vehicles.filter(v => v.status === 'in_transit');
  else if(filter === 'available') filtered = vehicles.filter(v => v.status === 'available');

  const getStatusColor = (v) => {
    if(v.status === 'available') return 'badge gray';
    if(!v.trip) return 'badge gray';
    if(SOURCE_STEPS.includes(v.step)) return 'badge amber';
    if(v.step === 'departed') return 'badge blue';
    if(DEST_STEPS.includes(v.step)) return 'badge green';
    return 'badge gray';
  };

  const getStatusLabel = (v) => {
    if(!v.trip) return 'Available';
    return STEP_LABEL[v.step] || v.step;
  };

  return `
  <div>
    <div class="section-title">Fleet Status Board <span class="count">${filtered.length}</span></div>
    <div class="toolbar">
      <div class="pill-row">
        <button class="btn btn-sm ${filter === 'all' ? 'btn-primary' : 'btn-outline'}" onclick="S.fleetFilter.type='all'; render()">All (${vehicles.length})</button>
        <button class="btn btn-sm ${filter === 'busy' ? 'btn-primary' : 'btn-outline'}" onclick="S.fleetFilter.type='busy'; render()">In Transit (${vehicles.filter(v=>v.status==='in_transit').length})</button>
        <button class="btn btn-sm ${filter === 'available' ? 'btn-primary' : 'btn-outline'}" onclick="S.fleetFilter.type='available'; render()">Available (${vehicles.filter(v=>v.status==='available').length})</button>
      </div>
    </div>

    ${filtered.length ? `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Vehicle</th>
            <th>Status</th>
            <th>Current Location</th>
            <th>Duration</th>
            <th>Route</th>
            <th>Next Gate</th>
          </tr>
        </thead>
        <tbody>
          ${filtered.map(v => `
          <tr>
            <td class="mono"><strong>${escapeHtml(v.number)}</strong></td>
            <td><span class="${getStatusColor(v)}">${getStatusLabel(v)}</span></td>
            <td>${escapeHtml(v.location || 'Yard')}</td>
            <td class="mono">${v.trip ? v.durationMins + ' min' : '—'}</td>
            <td>${v.trip ? escapeHtml(v.sourceLocation) + ' → ' + escapeHtml(v.destLocation) : '—'}</td>
            <td>${v.trip ? escapeHtml(v.destLocation) : '—'}</td>
          </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    ` : `<div class="empty"><div class="big">✓</div>All vehicles are ready and available.</div>`}
  </div>
  `;
}

/* ================= DASHBOARD ================= */
function renderDashboard(){
  const fs = S.dashFilter;
  const isLive = fs.preset==='today' && fs.vehicleId==='all';
  const {start,end} = presetRangeMs(fs);
  const days = daysInRange(fs);
  const rangeAll = tripsInRange(fs);
  const completedRange = rangeAll.filter(t=>t.status==='completed');
  const avg = (arr)=> arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
  const loadTimes = completedRange.map(t=>tripMetrics(t).loadingTime).filter(x=>x!=null);
  const travelTimes = completedRange.map(t=>tripMetrics(t).travelTime).filter(x=>x!=null);
  const unloadTimes = completedRange.map(t=>tripMetrics(t).unloadingTime).filter(x=>x!=null);
  const turns = completedRange.map(t=>tripMetrics(t).turnaround).filter(x=>x!=null);
  const runningMs = rangeAll.reduce((sum,t)=>sum+(tripMetrics(t).running||0),0);
  const vehCountForUtil = fs.vehicleId==='all' ? S.vehicles.filter(v=>v.active!==false).length : 1;
  const workdayMs = S.settings.workdayHours*3600000*vehCountForUtil*days;
  const utilization = workdayMs>0 ? Math.min(100, (runningMs/workdayMs*100)) : 0;
  const longestDelay = completedRange.reduce((max,t)=>{ const m=tripMetrics(t); return Math.max(max, m.totalWait||0); },0);
  const fastest = turns.length ? Math.min(...turns) : null;
  const activeCount = rangeAll.length - completedRange.length;

  return `
  <div class="section-title">${t('dashToday')} ${isLive?`<span class="tag" style="background:var(--green-light);color:var(--green);">● LIVE</span>`:''}
    <span class="tag">${isLive ? new Date().toLocaleDateString('en-IN',{weekday:'long', day:'2-digit', month:'short'}) : new Date(start).toLocaleDateString('en-IN',{day:'2-digit',month:'short'})+' – '+new Date(end).toLocaleDateString('en-IN',{day:'2-digit',month:'short'})}</span>
  </div>
  ${rangeBarHtml('dashFilter', true)}
  <div class="grid grid-4">
    ${statCard(t('statTotalTrips'), completedRange.length + (isLive && activeCount ? ' <span class="unit">('+activeCount+')</span>' : ''), '')}
    ${statCard(t('statAvgLoading'), fmtDur(avg(loadTimes)), '')}
    ${statCard(t('statAvgTravel'), fmtDur(avg(travelTimes)), '')}
    ${statCard(t('statAvgUnloading'), fmtDur(avg(unloadTimes)), '')}
  </div>
  <div class="grid grid-3" style="margin-top:16px;">
    ${statCard(t('statUtilization'), utilization.toFixed(0)+'%', '', true)}
    ${statCard(t('statLongestDelay'), fmtDur(longestDelay), '', true)}
    ${statCard(t('statFastestTrip'), fmtDur(fastest), '', true)}
  </div>
  ${isLive ? `
  <div class="section-title">${t('liveFleetStatus')}</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>${tLine('thVehicle')}</th><th>${tLine('thDriver')}</th><th>${tLine('thRoute')}</th><th>${tLine('thStage')}</th><th>${tLine('thSince')}</th></tr></thead>
      <tbody>
        ${S.vehicles.filter(v=>v.active!==false).map(v=>{
          const tr = activeTripForVehicle(v.id);
          if(!tr) return `<tr><td class="mono">${v.number}</td><td colspan="4" style="color:var(--muted)">${tLine('idleWord')}${vehicleIdleMs(v.id)!=null?' · '+fmtDur(vehicleIdleMs(v.id)):''}</td></tr>`;
          const key = nextStepKey(tr);
          const lastDoneKey = STEP_KEYS[STEP_KEYS.indexOf(key)-1];
          return `<tr><td class="mono">${v.number}</td><td>${escapeHtml(tr.driverName)}</td><td>${escapeHtml(tr.sourceName)} → ${escapeHtml(tr.destName)}</td>
            <td><span class="badge amber">${key ? tLine('awaitingWord')+': '+tLine(STEP_LABEL_KEY[key]) : tLine('wrappingUp')}</span></td>
            <td class="mono">${lastDoneKey ? fmtTime(tr.ts[lastDoneKey]) : fmtTime(tr.createdAt)}</td></tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>` : trendChartHtml(dayBucketsFor(rangeAll, start, end))}`;
}
function statCard(label, value, unit, alt){
  return `<div class="card stat-card ${alt?'alt':''}"><div class="bar"></div><div class="label">${label}</div><div class="value">${value}${unit?` <span class="unit">${unit}</span>`:''}</div></div>`;
}

  const vtCompleted = vt.filter(t=>t.status==='completed');
  const loadT = vtCompleted.map(t=>tripMetrics(t).loadingTime).filter(x=>x!=null);
  const travT = vtCompleted.map(t=>tripMetrics(t).travelTime).filter(x=>x!=null);
  const unlT = vtCompleted.map(t=>tripMetrics(t).unloadingTime).filter(x=>x!=null);
  const turnT = vtCompleted.map(t=>tripMetrics(t).turnaround).filter(x=>x!=null);
  const running = vt.reduce((s,t)=>s+(tripMetrics(t).running||0),0);
  const workdayMs = S.settings.workdayHours*3600000*days;
  const eff = workdayMs>0 ? Math.min(100, running/workdayMs*100) : 0;

  return `
  <div class="section-title">${t('vehReportTitle')} <span class="tag">${escapeHtml(v?v.number:'')}</span></div>
  ${rangeBarHtml('vehFilter', true)}
  <div class="grid grid-4">
    ${statCard(t('statTotalTrips'), vt.length, '')}
    ${statCard(t('statAvgLoading'), fmtDur(avg(loadT)), '')}
    ${statCard(t('statAvgTravel'), fmtDur(avg(travT)), '')}
    ${statCard(t('statAvgUnloading'), fmtDur(avg(unlT)), '')}
  </div>
  <div class="grid grid-3" style="margin-top:16px;">
    ${statCard(tLine('thTotalRunning'), fmtDur(running), '', true)}
    ${statCard(tLine('thAvgTurnaround'), fmtDur(avg(turnT)), '', true)}

      <tbody>
        ${vt.map(tr=>{

          const reasons = tr.delays ? Object.values(tr.delays).map(d=>d.reasonLabel).filter(Boolean) : [];

/* ================= ANALYTICS ================= */
function renderAnalytics(){
  const fs = S.analyticsFilter;
  const {start, end} = presetRangeMs(fs);
  const rangeAll = tripsInRange(fs);
  const completed = rangeAll.filter(t=>t.status==='completed');
  const avg=(arr)=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null;
  const locRows = S.locations.map(l=>{
    const asSource = completed.filter(t=>t.sourceId===l.id).map(t=>tripMetrics(t).loadingTime).filter(x=>x!=null);
    const asDest = completed.filter(t=>t.destId===l.id).map(t=>tripMetrics(t).unloadingTime).filter(x=>x!=null);
    return {name:l.name, avgLoading:avg(asSource), loadTrips:asSource.length, avgUnloading:avg(asDest), unlTrips:asDest.length};
  });
  let loadSum=0, travSum=0, waitSum=0, unlSum=0;
  completed.forEach(t=>{ const m=tripMetrics(t); loadSum+=m.loadingTime||0; travSum+=m.travelTime||0; waitSum+=m.totalWait||0; unlSum+=m.unloadingTime||0; });
  const total = loadSum+travSum+waitSum+unlSum || 1;
  const segs = [ {lk:'loadingWord', v:loadSum, c:'#F0603E'}, {lk:'travelWord', v:travSum, c:'#256F66'}, {lk:'waitingWord', v:waitSum, c:'#F0AA3D'}, {lk:'unloadingWord', v:unlSum, c:'#3C9E74'} ];
  let acc=0; const gradientParts = segs.map(s=>{ const start=acc/total*360; acc+=s.v; const end=acc/total*360; return `${s.c} ${start}deg ${end}deg`; }).join(', ');
  const totalWaitAll = rangeAll.reduce((s,t)=>s+(tripMetrics(t).totalWait||0),0);

  // trend: trips per calendar day across the range
  const dayBuckets = dayBucketsFor(rangeAll, start, end);

  // delay reason breakdown
  const reasonCounts = {};
  rangeAll.forEach(t=>{
    if(!t.delays) return;
    Object.values(t.delays).forEach(d=>{
      reasonCounts[d.reasonLabel] = (reasonCounts[d.reasonLabel]||0) + 1;
    });
  });
  const reasonRows = Object.entries(reasonCounts).sort((a,b)=>b[1]-a[1]);
  const maxReason = Math.max(1, ...reasonRows.map(r=>r[1]));

  // top routes
  const routeMap = {};
  completed.forEach(t=>{
    const key = t.sourceName+' → '+t.destName;
    if(!routeMap[key]) routeMap[key] = {label:key, count:0, turns:[]};
    routeMap[key].count++;
    const m = tripMetrics(t); if(m.turnaround!=null) routeMap[key].turns.push(m.turnaround);
  });
  const topRoutes = Object.values(routeMap).sort((a,b)=>b.count-a.count).slice(0,5);

  return `
  <div class="section-title">${t('analyticsTitle')}</div>
  ${rangeBarHtml('analyticsFilter', true)}
  <div class="grid grid-2">
    ${statCard(t('statTripsCompleted'), completed.length,'', true)}
    ${statCard(t('statTimeWaiting'), fmtDur(totalWaitAll),'', true)}
  </div>

  ${trendChartHtml(dayBuckets)}

  <div class="section-title">${t('avgByLocation')}</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>${tLine('thLocation')}</th><th>${tLine('thAvgLoadSrc')}</th><th>${tLine('thAvgUnlDest')}</th></tr></thead>
      <tbody>${locRows.map(r=>`<tr><td>${escapeHtml(r.name)}</td>
        <td class="mono">${r.loadTrips? fmtDur(r.avgLoading)+' ('+r.loadTrips+')' : '—'}</td>
        <td class="mono">${r.unlTrips? fmtDur(r.avgUnloading)+' ('+r.unlTrips+')' : '—'}</td></tr>`).join('')}</tbody>
    </table>
  </div>

  ${topRoutes.length ? `
  <div class="section-title">${t('topRoutes')}</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>${tLine('thRoute')}</th><th>${tLine('thTrips')}</th><th>${tLine('thAvgTurnaround')}</th></tr></thead>
      <tbody>${topRoutes.map(r=>`<tr><td>${escapeHtml(r.label)}</td><td>${r.count}</td><td class="mono">${fmtDur(avg(r.turns))}</td></tr>`).join('')}</tbody>
    </table>
  </div>` : ''}

  <div class="section-title">${t('delayReasonsBreakdown')}</div>
  ${reasonRows.length ? `
  <div class="card">
    ${reasonRows.map(([label,count])=>`<div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:4px;"><span>${escapeHtml(label)}</span><span class="mono">${count}</span></div>
      <div style="background:var(--line);border-radius:6px;height:8px;overflow:hidden;"><div style="width:${(count/maxReason*100)}%;height:100%;background:var(--red);"></div></div>
    </div>`).join('')}
  </div>` : `<div class="empty" style="padding:24px;">${tLine('noDelaysInRange')}</div>`}

  <div class="section-title">${t('timeBreakdown')}</div>
  <div class="card">
    <div class="pie-wrap">
      <div class="pie" style="background:conic-gradient(${total>4?gradientParts:'#eee 0 360deg'});"></div>
      <div class="legend">${segs.map(s=>`<div class="row"><span class="sw" style="background:${s.c}"></span>${tLine(s.lk)} <b>${total>4?((s.v/total*100).toFixed(0)+'%'):'—'}</b></div>`).join('')}</div>
    </div>
  </div>`;
}

/* ================= ALERTS ================= */
function renderAlerts(){
  const today = S.trips.filter(t=>isToday(t.createdAt));
  const tripAlerts = [];
  today.forEach(t=>{ const flags = tripFlags(t); if(flags.length) tripAlerts.push({t, flags}); });
  const activeAlerts = tripAlerts.filter(a=>a.t.status==='in_progress');
  const idleAlerts = S.vehicles.filter(v=>v.active!==false).map(v=>({v, idle:vehicleIdleMs(v.id)})).filter(x=>x.idle!=null && x.idle>7200000);
  const totalActive = activeAlerts.length + idleAlerts.length;

  const notifBanner = ('Notification' in window && Notification.permission !== 'granted') ? `
  <div style="background:var(--amber-light);border:1.5px solid var(--amber);border-radius:var(--radius);padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <span style="font-size:20px;">🔔</span>
    <div style="flex:1;min-width:200px;"><b>Enable push notifications</b><br><span style="font-size:13px;color:var(--muted);">Get notified on your phone the moment a vehicle exceeds the time limit — even with the app in the background.</span></div>
    <button class="btn btn-primary btn-sm" onclick="requestNotificationPermission().then(()=>render())">Allow Notifications</button>
  </div>` : (Notification.permission === 'granted' ? `<div style="font-size:12px;color:var(--green);margin-bottom:10px;">🔔 Push notifications are <b>active</b> — you'll be alerted even when the app is in the background.</div>` : '');

  return `
  ${notifBanner}
  <div class="section-title">${t('alertsTitle')} <span class="tag">Loading &gt; ${S.settings.expectedLoading}m · Travel &gt; ${S.settings.expectedTravel}m · Unloading &gt; ${S.settings.expectedUnloading}m · Idle &gt; 2h</span>${totalActive>0?`<span class="count" style="background:var(--red-light);color:var(--red);">${totalActive} active</span>`:''}</div>
  ${idleAlerts.length ? `<div class="table-wrap" style="margin-bottom:20px;"><table><thead><tr><th>${tLine('thVehicle')}</th><th>${tLine('idleWord')}</th></tr></thead>
  <tbody>${idleAlerts.map(a=>`<tr class="flag-row"><td class="mono">${a.v.number}</td><td class="mono kpi-flag">${fmtDur(a.idle)}</td></tr>`).join('')}</tbody></table></div>` : ''}
  ${tripAlerts.length ? `<div class="table-wrap"><table>
    <thead><tr><th>${tLine('thVehicle')}</th><th>${tLine('thDriver')}</th><th>${tLine('thRoute')}</th><th>${tLine('thStatus')}</th><th>${tLine('thFlags')}</th></tr></thead>
    <tbody>${tripAlerts.map(a=>`<tr class="flag-row"><td class="mono">${a.t.vehicleNumber}</td><td>${escapeHtml(a.t.driverName)}</td>
      <td>${escapeHtml(a.t.sourceName)} → ${escapeHtml(a.t.destName)}</td>
      <td><span class="badge ${a.t.status==='completed'?'gray':'red'}">${a.t.status==='completed'?tLine('completedWord'):'⚠ Overdue'}</span></td>
      <td>${a.flags.map(f=>`<span class="badge red" style="margin-right:4px;">${f}</span>`).join('')}</td></tr>`).join('')}</tbody></table></div>`
    : (idleAlerts.length?'':`<div class="empty"><div class="big">✅</div>${tLine('alertsNone')}</div>`)}`;
}

/* ================= REPORTS / EXPORT ================= */
function reportRows(){
  return tripsInRange(S.reportsFilter).sort((a,b)=>b.createdAt-a.createdAt).map(t=>{
    const m = tripMetrics(t);
    const delayList = t.delays ? Object.values(t.delays) : [];
    return {
      'Date': fmtDate(t.createdAt), 'Vehicle': t.vehicleNumber, 'Driver': t.driverName, 'From': t.sourceName, 'To': t.destName, 'Status': t.status,
      'Reached Source': t.ts.reachedSource?new Date(t.ts.reachedSource).toLocaleString('en-IN'):'',
      'Loading Started': t.ts.loadingStart?new Date(t.ts.loadingStart).toLocaleString('en-IN'):'',
      'Loading Completed': t.ts.loadingEnd?new Date(t.ts.loadingEnd).toLocaleString('en-IN'):'',
      'Departed': t.ts.departed?new Date(t.ts.departed).toLocaleString('en-IN'):'',
      'Reached Destination': t.ts.reachedDestination?new Date(t.ts.reachedDestination).toLocaleString('en-IN'):'',
      'Unloading Started': t.ts.unloadingStart?new Date(t.ts.unloadingStart).toLocaleString('en-IN'):'',
      'Unloading Completed': t.ts.unloadingEnd?new Date(t.ts.unloadingEnd).toLocaleString('en-IN'):'',

function exportCSV(){
  const rows = reportRows(); if(!rows.length){ alert('No trips today to export.'); return; }
  const headers = Object.keys(rows[0]);
  const csv = [headers.join(',')].concat(rows.map(r=>headers.map(h=>`"${(r[h]??'').toString().replace(/"/g,'""')}"`).join(','))).join('\n');
  downloadBlob(new Blob([csv],{type:'text/csv'}), `snaptrack-trips-${dateStamp()}.csv`);
}
function exportExcel(){
  const rows = reportRows(); if(!rows.length){ alert('No trips today to export.'); return; }
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Trips');
  XLSX.writeFile(wb, `snaptrack-trips-${dateStamp()}.xlsx`);
}
function exportPDF(){
  const rows = reportRows(); if(!rows.length){ alert('No trips today to export.'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:'landscape'});
  doc.setFontSize(14); doc.text('SnapTrack — Yogabar Logistics Trip Report ('+dateStamp()+')', 14, 14);
  doc.autoTable({
    startY:20, styles:{fontSize:7},
    head:[['Date','Vehicle','Driver','From','To','Status','Loading(min)','Travel(min)','Unloading(min)','Turnaround(min)','Delay Reason']],
    body: rows.map(r=>[r['Date'],r['Vehicle'],r['Driver'],r['From'],r['To'],r['Status'],r['Loading Time (min)'],r['Travel Time (min)'],r['Unloading Time (min)'],r['Turnaround (min)'],r['Delay Reason(s)']])
  });
  doc.save(`snaptrack-trips-${dateStamp()}.pdf`);
}
function dateStamp(){ const d=new Date(); return d.toISOString().slice(0,10); }
function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}

  if(S.users.some(u=>u.username===username)){ alert('That username is already taken.'); return; }
  try{

  try{

    render();
  }catch(e){
    alert(e.message || 'Could not update the account.');

async function exportFullBackup(){
  const allTrips = S.trips; // already the full in-memory set loaded from all month shards
  const backup = {
    exportedAt: new Date().toISOString(),
    app: 'SnapTrack', version: 1,
    vehicles: S.vehicles, locations: S.locations, users: S.users,
    delayReasons: S.delayReasons, settings: S.settings, trips: allTrips
  };
  downloadBlob(new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'}), `snaptrack-backup-${dateStamp()}.json`);
}
async function restoreFromBackup(){
  const fileInput = document.getElementById('restoreFile');
  const file = fileInput && fileInput.files[0];
  if(!file){ alert('Choose a backup .json file first.'); return; }
  if(!confirm('This will overwrite ALL current vehicles, locations, users, delay reasons, settings, and trips with the contents of this file. Continue?')) return;
  try{
    const text = await file.text();
    const backup = JSON.parse(text);
    if(!backup || !Array.isArray(backup.trips)){ alert('This does not look like a valid SnapTrack backup file.'); return; }
    S.vehicles = backup.vehicles || []; await saveVehicles();
    S.locations = backup.locations || []; await saveLocations();
    S.users = backup.users || []; await saveUsers();
    S.delayReasons = backup.delayReasons || []; await saveDelayReasons();
    S.settings = Object.assign({}, DEFAULT_SETTINGS, backup.settings||{}); await saveSettings();
    await restoreTripsFromBackup(backup.trips || []);
    alert('Backup restored. Reloading…');
    location.reload();
  }catch(e){
    alert('Could not read that file: '+e.message);
  }
}
async function restoreTripsFromBackup(trips){
  const shards = {};
  trips.forEach(tr=>{ const mk=monthKeyOf(tr.createdAt); (shards[mk]=shards[mk]||[]).push(tr); });
  const months = Object.keys(shards).sort();
  await Promise.all(months.map(mk=>sSet('trips_'+mk, shards[mk], true)));
  await sSet('trips_index', months, true);
  S.tripMonthsIndex = months;
  S.trips = trips;
}

/* ========== DELAY NOTIFICATION ENGINE ========== */
function checkAndNotifyDelays(){
  if(!S.user || S.user.role==='driver') return;
  if(!('Notification' in window) || Notification.permission !== 'granted') return;

  const today = S.trips.filter(t => isToday(t.createdAt) && t.status === 'in_progress');
  today.forEach(trip => {
    const flags = tripFlags(trip);
    if(!flags.length) return;
    // Operator: only notify about their location's trips
    if(S.user.role === 'operator'){
      if(trip.sourceId !== S.user.locationId && trip.destId !== S.user.locationId) return;
    }
    flags.forEach(flag => {
      const key = trip.id + '|' + flag;
      if(!S.notifiedDelays.has(key)){
        S.notifiedDelays.add(key);
        try{
          const n = new Notification('⚠️ SnapTrack Delay Alert', {
            body: `${trip.vehicleNumber} (${trip.sourceName} → ${trip.destName}): ${flag}`,
            icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><circle cx="16" cy="16" r="16" fill="%23F0603E"/><text x="16" y="21" text-anchor="middle" fill="white" font-size="18">⚠</text></svg>',
            tag: key,
            requireInteraction: false
          });
          n.onclick = ()=>{ goView('alerts'); n.close(); window.focus(); };
        }catch(e){ console.warn('Notification error:', e); }
      }
    });
  });
}
async function requestNotificationPermission(){
  if(!('Notification' in window)) return;
  if(Notification.permission === 'granted') return;
  if(Notification.permission !== 'denied'){
    await Notification.requestPermission();
  }
}

setInterval(()=>{
  if(!S.user) return;
  const dashLive = S.view==='dashboard' && S.dashFilter.preset==='today' && S.dashFilter.vehicleId==='all';
  if(S.view==='trip'||S.view==='deck'||dashLive||S.view==='alerts'||S.view==='fleetboard') render();
  checkAndNotifyDelays();
}, 30000);

function addAppIcons(){
  const icon = document.createElement('link'); icon.rel='icon'; icon.href=YB_LOGO; document.head.appendChild(icon);
  const touch = document.createElement('link'); touch.rel='apple-touch-icon'; touch.href=YB_LOGO; document.head.appendChild(touch);
}
addAppIcons();
boot();
</script>
